name: Build Service-NSW Clearnet (AltStore)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Set app version
        run: |
          echo "APP_VERSION=1.0.${{ github.run_number }}" >> $GITHUB_ENV
          echo "BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_ENV
          echo "EXPO_PUBLIC_USE_TOR=false" >> $GITHUB_ENV

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Generate iOS Directory (Expo Prebuild)
        run: npx expo prebuild --platform ios --no-install --clean
        env:
          EXPO_PUBLIC_USE_TOR: 'false'
          EXPO_PUBLIC_CLEARNET_API_URL: ${{ secrets.CLEARNET_API_URL }}
          APP_VERSION: ${{ env.APP_VERSION }}
          BUILD_NUMBER: ${{ env.BUILD_NUMBER }}

      - name: Set Xcode Version
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app
          xcodebuild -version

      - name: Fix Node Path and EXConstants
        run: |
          ln -s $(which node) /usr/local/bin/node || true
          echo "export NODE_BINARY=$(which node)" > .xcode.env
          cp .xcode.env ios/.xcode.env

      - name: Patch Podfile and Disable New Arch
        run: |
          node -e "
          const fs = require('fs');
          const path = 'ios/Podfile';
          let content = fs.readFileSync(path, 'utf8');

          // 1. Force New Architecture OFF globally
          content = 'ENV[\"RCT_NEW_ARCH_ENABLED\"] = \"0\"\n' + content;

          // 2. Add Tor pod (linked but never started in clearnet mode)
          const torLine = \"\n  pod 'react-native-tor', :path => '../node_modules/react-native-tor'\n\";
          const lastEndIndex = content.lastIndexOf('end');
          if (lastEndIndex !== -1 && !content.includes('react-native-tor')) {
            content = content.slice(0, lastEndIndex) + torLine + content.slice(lastEndIndex);
          }

          fs.writeFileSync(path, content);
          console.log('--- PATCHED PODFILE ---');
          console.log(fs.readFileSync(path, 'utf8'));
          "

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-clear-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-clear-

      - name: Install CocoaPods
        run: |
          cd ios
          pod install
        env:
          RCT_NEW_ARCH_ENABLED: 0

      - name: Build Unsigned App
        run: |
          SCHEME_NAME=$(ls ios | grep .xcworkspace | cut -f 1 -d '.')
          echo "Building scheme: $SCHEME_NAME"

          xcodebuild -workspace ios/*.xcworkspace \
                     -scheme "$SCHEME_NAME" \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_ENTITLEMENTS="" \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE_SPECIFIER="" \
                     GENERATE_INFOPLIST_FILE=YES \
                     MARKETING_VERSION="${APP_VERSION}" \
                     CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
                     RCT_NEW_ARCH_ENABLED=0 \
                     RCT_BRIDGELESS_ENABLED=0 \
                     DEBUG_INFORMATION_FORMAT=dwarf \
                     COMPILER_INDEX_STORE_ENABLE=NO
        env:
          EXPO_PUBLIC_USE_TOR: 'false'
          EXPO_PUBLIC_CLEARNET_API_URL: ${{ secrets.CLEARNET_API_URL }}

      - name: Create IPA for SideStore
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r Service-NSW-Clear-Unsigned.ipa Payload

      - name: Create GitHub Release
        run: |
          gh release create "v${APP_VERSION}-clear" \
            --title "Service NSW Clearnet v${APP_VERSION}" \
            --notes "Clearnet build ${{ github.run_number }} — commit ${{ github.sha }}" \
            "Service-NSW-Clear-Unsigned.ipa#Service-NSW-Clear-Unsigned.ipa"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update SideStore source JSON (clearnet entry)
        run: |
          IPA_SIZE=$(wc -c < Service-NSW-Clear-Unsigned.ipa | tr -d ' ')
          DOWNLOAD_URL="https://github.com/eqcui/digitalid/releases/download/v${APP_VERSION}-clear/Service-NSW-Clear-Unsigned.ipa"
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          node -e "
          const fs = require('fs');
          const source = JSON.parse(fs.readFileSync('altstore-source.json', 'utf8'));
          const clearnetId = 'com.eqcui.ServiceNSWClear';
          let app = source.apps.find(a => a.bundleIdentifier === clearnetId);
          if (!app) {
            app = {
              name: 'Service NSW (Clearnet)',
              bundleIdentifier: clearnetId,
              developerName: 'eqcui',
              subtitle: 'Digital identity — standard networking',
              localizedDescription: 'Service NSW digital ID app using standard networking (no Tor).',
              iconURL: 'https://raw.githubusercontent.com/eqcui/digitalid/main/assets/icon.png',
              versions: []
            };
            source.apps.push(app);
          }
          app.versions.unshift({
            version: process.env.APP_VERSION,
            date: '${BUILD_DATE}',
            downloadURL: '${DOWNLOAD_URL}',
            size: parseInt('${IPA_SIZE}')
          });
          app.versions = app.versions.slice(0, 10);
          fs.writeFileSync('altstore-source.json', JSON.stringify(source, null, 2) + '\n');
          console.log('Updated clearnet source to', process.env.APP_VERSION);
          "

      - name: Commit updated source JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp altstore-source.json /tmp/altstore-source.json
          git reset --hard HEAD
          git clean -fd
          git pull origin main
          cp /tmp/altstore-source.json altstore-source.json
          git add altstore-source.json
          git commit -m "Update SideStore source (clearnet) to v${APP_VERSION} [skip ci]"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload IPA as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: Service-NSW-Clear-IPA
          path: Service-NSW-Clear-Unsigned.ipa
