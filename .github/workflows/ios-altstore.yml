name: Build Service-NSW (AltStore)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history needed so git push back to main works cleanly
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Set app version
        run: echo "APP_VERSION=1.0.${{ github.run_number }}" >> $GITHUB_ENV

      - name: Install Dependencies
        run: |
          # --legacy-peer-deps is required because react-native-tor (0.1.8) has loose
          # peer dependency declarations that conflict with strict npm resolution
          npm install --legacy-peer-deps

      - name: Patch version into app.json
        run: |
          node -e "
          const fs = require('fs');
          const cfg = JSON.parse(fs.readFileSync('app.json', 'utf8'));
          cfg.expo.version = process.env.APP_VERSION;
          cfg.expo.ios = cfg.expo.ios || {};
          cfg.expo.ios.buildNumber = '${{ github.run_number }}';
          fs.writeFileSync('app.json', JSON.stringify(cfg, null, 2));
          console.log('Patched version to', process.env.APP_VERSION);
          "

      - name: Generate iOS Directory (Expo Prebuild)
        run: npx expo prebuild --platform ios --no-install --clean

      - name: Set Xcode Version
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app
          xcodebuild -version

      - name: Fix Node Path and EXConstants
        run: |
          ln -s $(which node) /usr/local/bin/node || true
          echo "export NODE_BINARY=$(which node)" > .xcode.env
          cp .xcode.env ios/.xcode.env

      - name: Patch Podfile and Disable New Arch
        run: |
          node -e "
          const fs = require('fs');
          const path = 'ios/Podfile';
          let content = fs.readFileSync(path, 'utf8');

          // 1. Force New Architecture OFF globally
          // This overrides the environment and the properties file
          content = 'ENV[\"RCT_NEW_ARCH_ENABLED\"] = \"0\"\n' + content;

          // 2. Add Tor pod at the very end of the main target block
          // We look for the LAST 'end' in the file (which usually closes the main target)
          const torLine = \"\n  pod 'react-native-tor', :path => '../node_modules/react-native-tor'\n\";
          const lastEndIndex = content.lastIndexOf('end');
          if (lastEndIndex !== -1 && !content.includes('react-native-tor')) {
            content = content.slice(0, lastEndIndex) + torLine + content.slice(lastEndIndex);
          }

          fs.writeFileSync(path, content);
          console.log('--- PATCHED PODFILE ---');
          console.log(fs.readFileSync(path, 'utf8'));
          "

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install CocoaPods
        run: |
          cd ios
          # Use --repo-update to ensure we have the latest specs for dependencies
          pod install --repo-update
        env:
          RCT_NEW_ARCH_ENABLED: 0

      - name: Verify react-native-tor is linked
        run: |
          if grep -q "react-native-tor" ios/Podfile.lock; then
            echo "✅ react-native-tor successfully found in Podfile.lock"
          else
            echo "❌ react-native-tor NOT found in lockfile."
            exit 1
          fi

      - name: Build Unsigned App
        run: |
          # 1. Get the Scheme Name automatically
          SCHEME_NAME=$(ls ios | grep .xcworkspace | cut -f 1 -d '.')
          echo "Building scheme: $SCHEME_NAME"

          # 2. Run the build with Legacy Architecture flags
          xcodebuild -workspace ios/*.xcworkspace \
                     -scheme "$SCHEME_NAME" \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_ENTITLEMENTS="" \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE_SPECIFIER="" \
                     GENERATE_INFOPLIST_FILE=YES \
                     RCT_NEW_ARCH_ENABLED=0 \
                     RCT_BRIDGELESS_ENABLED=0

      - name: Create IPA for SideStore
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r Service-NSW-Unsigned.ipa Payload

      - name: Create GitHub Release
        run: |
          gh release create "v${APP_VERSION}" \
            --title "Service NSW v${APP_VERSION}" \
            --notes "Automated build ${{ github.run_number }} — commit ${{ github.sha }}" \
            "Service-NSW-Unsigned.ipa#Service-NSW-Unsigned.ipa"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update SideStore source JSON
        run: |
          IPA_SIZE=$(wc -c < Service-NSW-Unsigned.ipa | tr -d ' ')
          DOWNLOAD_URL="https://github.com/eqcui/digitalid/releases/download/v${APP_VERSION}/Service-NSW-Unsigned.ipa"
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          node -e "
          const fs = require('fs');
          const source = JSON.parse(fs.readFileSync('altstore-source.json', 'utf8'));
          source.apps[0].versions.unshift({
            version: process.env.APP_VERSION,
            date: '${BUILD_DATE}',
            downloadURL: '${DOWNLOAD_URL}',
            size: parseInt('${IPA_SIZE}')
          });
          // Keep only last 10 versions
          source.apps[0].versions = source.apps[0].versions.slice(0, 10);
          fs.writeFileSync('altstore-source.json', JSON.stringify(source, null, 2) + '\n');
          console.log('Updated source to', process.env.APP_VERSION);
          "

      - name: Commit updated source JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Save the updated JSON before wiping the working tree
          cp altstore-source.json /tmp/altstore-source.json
          # Hard-reset to clear all dirty files (app.json patch, generated ios/, etc.)
          git reset --hard HEAD
          git clean -fd
          # Pull latest commits from remote
          git pull origin main
          # Restore our updated JSON and commit
          cp /tmp/altstore-source.json altstore-source.json
          git add altstore-source.json
          git commit -m "Update SideStore source to v${APP_VERSION} [skip ci]"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload IPA as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: Service-NSW-IPA
          path: Service-NSW-Unsigned.ipa
