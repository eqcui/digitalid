name: Build Service-NSW (AltStore)

on:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install Dependencies
        run: |
          # We use --legacy-peer-deps to handle the Reanimated/Skia version conflict
          npm install --legacy-peer-deps

      - name: Generate iOS Directory (Expo Prebuild)
        run: npx expo prebuild --platform ios --no-install --clean

      - name: Set Xcode Version
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app
          xcodebuild -version

      - name: Fix Node Path and EXConstants
        run: |
          ln -s $(which node) /usr/local/bin/node || true
          echo "export NODE_BINARY=$(which node)" > .xcode.env
          cp .xcode.env ios/.xcode.env

      - name: Disable New Architecture (required for react-native-tor)
        run: |
          # Force newArchEnabled to false in the Expo properties file
          if [ -f ios/Podfile.properties.json ]; then
            node -e "
              const fs = require('fs');
              const p = 'ios/Podfile.properties.json';
              const json = JSON.parse(fs.readFileSync(p, 'utf8'));
              json['newArchEnabled'] = 'false';
              fs.writeFileSync(p, JSON.stringify(json, null, 2));
              console.log('Forced newArchEnabled to false:', json);
            "
          fi

      - name: Install CocoaPods
        run: |
          cd ios && pod install
        env:
          # This tells Reanimated 3.x to allow the legacy bridge
          RCT_NEW_ARCH_ENABLED: 0
          CP_HOMEBREW_CLEAN_INSTALL_AFTER_UPDATE: 1



      - name: Verify react-native-tor is linked
        run: |
          if grep -r "RNTor" ios/Pods --include="*.h" -l; then
            echo "✅ react-native-tor native module found in Pods"
          else
            echo "❌ react-native-tor native module NOT found — build may fail"
            exit 1
          fi

      - name: Build Unsigned App
        run: |
          SCHEME_NAME=$(ls ios | grep .xcworkspace | cut -f 1 -d '.')
          xcodebuild -workspace ios/*.xcworkspace \
                     -scheme "$SCHEME_NAME" \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_ENTITLEMENTS="" \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE_SPECIFIER="" \
                     GENERATE_INFOPLIST_FILE=YES \
                     RCT_NEW_ARCH_ENABLED=0

      - name: Create IPA for AltStore
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r Service-NSW-Unsigned.ipa Payload

      - name: Upload IPA to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: Service-NSW-IPA
          path: Service-NSW-Unsigned.ipa