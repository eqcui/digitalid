name: Build iOS IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios

      - name: Build App (Unsigned)
        run: |
          cd ios
          # We define SYMROOT to force the build output into the 'build' folder
          xcodebuild -workspace *.xcworkspace \
            -scheme $(ls -d *.xcodeproj | sed 's/\.xcodeproj//') \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ../build \
            SYMROOT=../build/Products \
            OBJROOT=../build/Intermediates \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: List Files (Debug)
        run: |
          echo "Looking for the .app file..."
          find build -name "*.app"

      - name: Create IPA
        run: |
          mkdir -p Payload
          # This finds the .app file wherever it is in the build folder and copies it
          APP_PATH=$(find build -name "*.app" | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r app-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-unsigned
          path: app-unsigned.ipa
          retention-days: 1